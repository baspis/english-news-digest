<!DOCTYPE html>
<html lang="ja">
<head>

  <meta name="color-scheme" content="light dark">
  <title>English News Digest</title>
  <script>(function () {
  const stored = localStorage.getItem('end-theme');

  document.documentElement.setAttribute('data-theme', theme);
})();</script>
